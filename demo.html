// ── Étoiles ──────────────────────────────────────────────────────────────────

const SINFO = {

};

// ── Placeholder « photo du lieu » (dégradé + nom) ─────────────────────────────
function Venue({ name, hue, h = 150, rounded = 0 }) {
  return (
    <div style={{ position: "relative", height: h, borderRadius: rounded, overflow: "hidden", background: `linear-gradient(155deg, hsl(${hue} 26% 24%), hsl(${hue} 42% 8%))`, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ position: "absolute", inset: 0, background: "radial-gradient(120% 90% at 50% 0%, transparent 45%, rgba(0,0,0,.5))" }} />
      <div style={{ fontSize: h > 250 ? 30 : 13, fontWeight: 900, letterSpacing: 2, color: "#ffffff16", textTransform: "uppercase", textAlign: "center", padding: "0 18px" }}>{name}</div>
    </div>
  );
}

// ── Fiche structure (profil, seule vue avec photo) ────────────────────────────
function StructPage({ name, onBack }) {
  const s = SINFO[name] || { hue: 220, verif: false, note: null, avis: 0, adr: "", apropos: "", avisList: [], pubs: 0 };
  const classe = s.note != null;
  return (
    <div style={{ position: "absolute", inset: 0, background: T.bg, zIndex: 60, overflowY: "auto" }}>
      <div style={{ position: "relative" }}>
        <Venue name={name} hue={s.hue} h={190} />
        <button onClick={onBack} style={{ position: "absolute", top: 14, left: 12, width: 36, height: 36, borderRadius: "50%", background: "rgba(0,0,0,.5)", border: "none", color: "#fff", fontSize: 18, cursor: "pointer", backdropFilter: "blur(4px)" }}>‹</button>
      </div>
      <div style={{ padding: "0 16px 26px", marginTop: -30, position: "relative" }}>
        <div style={{ display: "flex", gap: 12, alignItems: "flex-end", marginBottom: 12 }}>
          <div style={{ width: 64, height: 64, borderRadius: 16, background: `hsl(${s.hue} 30% 14%)`, border: `2px solid hsl(${s.hue} 30% 26%)`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 900, fontSize: 15, flexShrink: 0 }}>{name.split(" ").map(w => w[0]).join("").slice(0, 2)}</div>
          <div style={{ flex: 1, paddingBottom: 2 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
              <div style={{ fontSize: 20, fontWeight: 900, color: T.text }}>{name}</div>
              {s.verif && <span style={{ fontSize: 9, fontWeight: 800, color: "#22c55e", background: "#052e16", border: "1px solid #14532d", borderRadius: 20, padding: "3px 9px", whiteSpace: "nowrap" }}>✓ VÉRIFIÉE</span>}
            </div>
            {classe
              ? <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 3 }}><Stars n={s.note} size={12} /><span style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{String(s.note).replace(".", ",")}</span><span style={{ fontSize: 11, color: T.mu }}>({s.avis} avis)</span></div>
              : <span style={{ display: "inline-block", fontSize: 9, fontWeight: 700, color: "#22d3ee", background: "#22d3ee15", borderRadius: 8, padding: "2px 7px", marginTop: 4 }}>Nouvelle · pas encore classée</span>}
          </div>
        </div>
        {s.type && <div style={{ marginBottom: 8 }}><span style={{ display: "inline-block", fontSize: 10, fontWeight: 800, color: s.ess ? "#4ade80" : "#22d3ee", background: s.ess ? "#052e16" : "#22d3ee15", border: `1px solid ${s.ess ? "#14532d" : "#0e7490"}`, borderRadius: 20, padding: "3px 10px" }}>{s.ess ? "🤝 " : "🏢 "}{s.type}</span></div>}
        {s.siret && <div style={{ fontSize: 11, color: T.mu, marginBottom: 15 }}>SIRET {s.siret} ⓘ</div>}

        {classe && <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", background: T.card, border: `1px solid ${T.cb}`, borderRadius: 13, padding: "13px 0", marginBottom: 16 }}>
          {[[s.pubs, "missions publiées"], [s.presence + " %", "taux de présence"], [s.repw, "temps de réponse"]].map(([v, l], i) => (
            <div key={i} style={{ textAlign: "center", borderRight: i < 2 ? `1px solid ${T.cb}` : "none", padding: "0 6px" }}>
              <div style={{ fontSize: 16, fontWeight: 900, color: T.text }}>{v}</div>
              <div style={{ fontSize: 8.5, color: T.mu, marginTop: 2 }}>{l}</div>
            </div>
          ))}
        </div>}

        <div style={{ display: "flex", flexDirection: "column", gap: 9, paddingBottom: 15, marginBottom: 15, borderBottom: `1px solid ${T.cb}` }}>
          {[["📍", s.adr], ["🚇", s.metro], ["🕒", s.horaires]].filter(([, t]) => t).map(([ic, txt], i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 9, fontSize: 12, color: T.sub }}><span>{ic}</span>{txt}</div>
          ))}
        </div>

        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: T.text, marginBottom: 9 }}>Photos du lieu</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 6 }}>{[0, 1, 2, 3].map(i => <Venue key={i} name={name} hue={s.hue} h={58} rounded={9} />)}</div>
          <div style={{ fontSize: 11, color: "#22d3ee", fontWeight: 700, marginTop: 8 }}>Voir toutes les photos (8)</div>
        </div>

        {s.apropos && <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: T.text, marginBottom: 6 }}>À propos</div>
          <div style={{ fontSize: 12, color: T.sub, lineHeight: 1.6 }}>{s.apropos}</div>
        </div>}

        {s.avisList.length > 0 ? <div>
          <div style={{ fontSize: 13, fontWeight: 800, color: T.text, marginBottom: 9 }}>Avis récents</div>
          {s.avisList.map((a, i) => (
            <div key={i} style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 12, padding: "11px 13px", marginBottom: 7 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 5 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 30, height: 30, borderRadius: "50%", background: `hsl(${i * 90 + 40} 45% 45%)`, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 12 }}>{a[0].charAt(0)}</div>
                  <div><div style={{ fontSize: 12, fontWeight: 800, color: T.text }}>{a[0]}</div><div style={{ fontSize: 9, color: T.mu }}>{a[1]}</div></div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}><Stars n={a[2]} size={10} /><span style={{ fontSize: 11, fontWeight: 800, color: T.text }}>{String(a[2]).replace(".", ",")}</span></div>
              </div>
              <div style={{ fontSize: 11.5, color: T.sub, lineHeight: 1.5 }}>{a[3]}</div>
            </div>
          ))}
        </div>
          : <div style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 12, padding: "16px", textAlign: "center", fontSize: 11, color: T.mu }}>Nouvelle structure — pas encore d'avis. Elle sera classée après ses premières missions.</div>}
      </div>
    </div>
  );
}

// ── Aide & règles (worker + structure) ────────────────────────────────────────
function AideBlock({ onOpen }) {
  return (
    <div style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 12, padding: 13 }}>
      <div style={{ fontSize: 9, fontWeight: 700, color: T.mu, textTransform: "uppercase", letterSpacing: .5, marginBottom: 9 }}>Aide & règles</div>
      {[["cgu", "📄 Conditions Générales (CGU)"], ["rgpd", "🔒 Données personnelles (RGPD)"]].map(([k, l]) => (
        <button key={k} onClick={() => onOpen(k)} style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", background: T.row, border: "none", borderRadius: 8, padding: "10px 12px", marginBottom: 6, fontSize: 12, color: T.text, fontWeight: 600, cursor: "pointer" }}>
          <span>{l}</span><span style={{ color: T.mu }}>Lire →</span>
        </button>
      ))}
      <a href={RULES_URL} target="_blank" rel="noopener noreferrer" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.row, borderRadius: 8, padding: "10px 12px", fontSize: 12, color: "#22d3ee", fontWeight: 700, textDecoration: "none" }}>
        <span>Toutes les règles détaillées</span><span>↗</span>
      </a>
    </div>
  );
}

function DocModal({ dk, onClose }) {
  const d = DOCS[dk];
  if (!d) return null;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 500, padding: 16 }} onClick={onClose}>
      <div style={{ width: "100%", maxWidth: 380, maxHeight: "85vh", background: T.card, border: `1px solid ${T.cb}`, borderRadius: 16, display: "flex", flexDirection: "column", overflow: "hidden", fontFamily: FONT }} onClick={e => e.stopPropagation()}>
        <div style={{ padding: "14px 16px", borderBottom: `1px solid ${T.cb}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
          <span style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{d.titre}</span>
          <button onClick={onClose} style={{ background: T.row, border: "none", borderRadius: 6, width: 24, height: 24, cursor: "pointer", color: T.sub, fontSize: 13 }}>×</button>
        </div>
        <div style={{ overflowY: "auto", padding: "14px 16px 6px" }}>
          {d.blocs.map(([h, p], i) => <div key={i} style={{ marginBottom: 13 }}><div style={{ fontSize: 12, fontWeight: 800, color: T.text, marginBottom: 3 }}>{h}</div><div style={{ fontSize: 11, color: T.sub, lineHeight: 1.6 }}>{p}</div></div>)}
          <a href={RULES_URL} target="_blank" rel="noopener noreferrer" style={{ display: "block", fontSize: 11, color: "#22d3ee", fontWeight: 700, textDecoration: "none", padding: "4px 0 14px" }}>Toutes les règles détaillées ↗</a>
        </div>
        <div style={{ padding: "10px 16px 16px", borderTop: `1px solid ${T.cb}`, flexShrink: 0 }}>
          <button onClick={onClose} style={{ width: "100%", background: T.row, color: T.sub, border: "none", borderRadius: 8, padding: "10px 0", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Fermer</button>
        </div>
      </div>
    </div>
  );
}

// ═══ WORKER ══════════════════════════════════════════════════════════════════
function WorkerApp({ onBack, onDelete, infos, subscribed = false, demoSeconds = DEMO_SECONDS, onNeedSubscribe }) {
  const [tab, setTab] = useState("flux");
  const [flux] = useState(FLUX0);
  const [mine, setMine] = useState([]);      // missions acceptées / en cours
  const [hist, setHist] = useState(HIST0);   // CV vivant
  const [detail, setDetail] = useState(null);
  const [alrt, setAlrt] = useState(null);
  const [signal, setSignal] = useState(null);
  const [sigMotif, setSigMotif] = useState(null);
  const [sigNote, setSigNote] = useState("");
  const [recap, setRecap] = useState(null);
  const [docKey, setDocKey] = useState(null);
  const [structPage, setStructPage] = useState(null);
  const [aide, setAide] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [kycDone, setKycDone] = useState(false);
  const [kycFor, setKycFor] = useState(null);   // mission en attente de KYC (1re acceptation)
  const [kyc, setKyc] = useState({ idOk: false, iban: "" });
  const [wallet, setWallet] = useState({ dispo: 128, attente: 0 });
  const [gagne, setGagne] = useState({ mois: 340, annee: 1240 });   // pour la déclaration (DAC7)
  const [withdraw, setWithdraw] = useState(false);
  const [wAmt, setWAmt] = useState("");
  const [toast, setToast] = useState(null);
  const tr = useRef(null);
  const rtimer = useRef(null);
  const profil = infos || DEMO_PROFILE;

  const notif = m => { setToast(m); clearTimeout(tr.current); tr.current = setTimeout(() => setToast(null), 3000); };
  const moyenne = (() => { const r = hist.filter(h => h.note > 0); return r.length ? (r.reduce((s, h) => s + h.note, 0) / r.length).toFixed(1) : "—"; })();

  const accept = m => {
    if (mine.find(a => a.id === m.id)) return;
    if (!subscribed && onNeedSubscribe) { setDetail(null); onNeedSubscribe("worker"); return; }
    if (m.pay > 0 && !kycDone) { setKycFor(m); setDetail(null); return; }   // 1re mission payée : vérification d'identité
    setMine(l => [...l, m]); setDetail(null); notif("✓ Acceptée — retrouve-la dans Mes missions.");
  };
  const kycConfirm = () => {
    if (!(kyc.idOk && kyc.iban.replace(/\s/g, "").length >= 14)) return;
    setKycDone(true);
    const m = kycFor; setKycFor(null);
    if (m) { setMine(l => [...l, m]); notif("✓ Identité vérifiée — mission acceptée !"); setTab("moi"); }
  };
  const terminer = m => setRecap({ m });
  const rate = n => {
    const { m } = recap;
    setHist(h => [{ t: m.t, s: m.struct, note: n, dt: new Date().toLocaleDateString("fr", { day: "2-digit", month: "2-digit" }), pay: m.pay }, ...h]);
    setMine(l => l.filter(a => a.id !== m.id));
    setRecap(null);
    if (m.pay > 0) {
      setWallet(w => ({ ...w, attente: w.attente + m.pay }));
      setGagne(g => ({ mois: g.mois + m.pay, annee: g.annee + m.pay }));
      // Simulation J+3 : les fonds cantonnés (Lemonway) deviennent disponibles.
      clearTimeout(rtimer.current);
      rtimer.current = setTimeout(() => { setWallet(w => ({ dispo: w.dispo + m.pay, attente: Math.max(0, w.attente - m.pay) })); notif(`+${m.pay}€ disponibles au retrait.`); }, 4000);
      notif(`Mission ajoutée à ton CV · +${m.pay}€ (dispo à J+3)`);
    } else notif("Mission ajoutée à ton CV vivant ✓");
  };
  const doWithdraw = amt => {
    const a = Math.min(amt, wallet.dispo);
    if (a <= 0) return;
    setWallet(w => ({ ...w, dispo: w.dispo - a }));
    setWithdraw(false); setWAmt("");
    notif(`${a}€ envoyés sur ton compte · réception J+1 (Lemonway).`);
  };
  const closeSignal = () => { setSignal(null); setSigMotif(null); setSigNote(""); };
  const submitSignal = () => { notif("Signalement transmis — on revient vers toi sous 24h."); closeSignal(); };

  const S = { position: "absolute", inset: 0, background: "rgba(0,0,0,.82)", display: "flex", alignItems: "flex-end", zIndex: 50 };
  const SH = { width: "100%", background: T.card, borderRadius: "20px 20px 0 0", padding: "18px 16px 28px" };

  return (
    <div style={{ minHeight: "100vh", background: "#000", display: "flex", justifyContent: "center", padding: "16px 0", fontFamily: FONT }}>
      <div style={{ width: 385, background: T.bg, borderRadius: 40, border: `1px solid ${T.cb}`, display: "flex", flexDirection: "column", position: "relative", boxShadow: "0 20px 60px rgba(0,0,0,.5)", overflow: "hidden" }}>

        {/* Header */}
        <div style={{ padding: "22px 16px 12px", borderBottom: `1px solid ${T.cb}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: T.grad, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#fff", fontSize: 14 }}>U</div>
            <span style={{ fontSize: 10, fontWeight: 700, color: "#22d3ee", background: "#22d3ee15", borderRadius: 20, padding: "3px 8px" }}>{hist.length} missions au CV</span>
            {!subscribed && <span style={{ fontSize: 10, fontWeight: 800, color: "#fbbf24", background: "#1c1400", border: "1px solid #78350f", borderRadius: 20, padding: "3px 8px" }}>Démo {demoSeconds}s</span>}
          </div>

        </div>

        {toast && <div style={{ margin: "8px 12px 0", background: T.card, border: `1px solid ${T.cb}`, borderRadius: 8, padding: "7px 11px", fontSize: 11, color: T.sub }}>{toast}</div>}

        <div style={{ padding: "10px 12px", minHeight: 440 }}>

                    {m.sNote

                    {isA ? (m.solid ? "✓ Inscrit·e" : "✓ Acceptée") : (m.solid ? "🤝 Participer" : "Accepter")}
                  </button>
                </div>
              </div>;
            })}
          </div>}

          {/* ── MES MISSIONS + CV VIVANT ── */}
          {tab === "moi" && <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

            </div>)}

            {mine.length === 0 && <div style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 14, padding: "24px 16px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: T.sub, marginBottom: 12 }}>Aucune mission en cours</div>
              <button onClick={() => setTab("flux")} style={{ background: "#fff", color: "#000", border: "none", borderRadius: 9, padding: "9px 22px", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Voir le flux →</button>

            {/* CV VIVANT */}

                <div style={{ width: 40, height: 40, borderRadius: 11, background: "linear-gradient(135deg,#f97316,#dc2626)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#fff", fontSize: 17 }}>{profil.prenom.charAt(0)}</div>
                <div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7, marginBottom: 13 }}>

            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 6 }}>
              <span style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{detail.struct}</span>
              {detail.verif && <span style={{ fontSize: 8, fontWeight: 700, color: "#4ade80", background: "#052e16", borderRadius: 8, padding: "1px 5px" }}>✓ Vérifié</span>}
              <span style={{ marginLeft: "auto", fontSize: 10, color: "#22d3ee", fontWeight: 700 }}>Voir la fiche ›</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
              {detail.sNote
                ? <><Stars n={detail.sNote} size={13} /><span style={{ fontSize: 11, color: T.sub, fontWeight: 700 }}>{detail.sNote}/5</span><span style={{ fontSize: 10, color: T.mu }}>· {detail.sNb} avis</span></>
                : <span style={{ fontSize: 10, color: T.sub }}>Nouvelle structure — pas encore d'avis. Sera classée après ses premières missions.</span>}
            </div>
            <div style={{ fontSize: 11, color: T.sub }}>📍 {detail.adr}<span style={{ color: T.mu }}> · {detail.d} km</span></div>
          </div>
          <div style={{ fontSize: 12, color: T.sub, lineHeight: 1.55, marginBottom: 13 }}>{detail.desc}</div>
          <button onClick={() => accept(detail)} disabled={!!mine.find(a => a.id === detail.id)} style={{ width: "100%", background: mine.find(a => a.id === detail.id) ? "#052e16" : (detail.solid ? "#16a34a" : "#fff"), color: mine.find(a => a.id === detail.id) ? "#4ade80" : (detail.solid ? "#fff" : "#000"), border: "none", borderRadius: 10, padding: "12px 0", fontSize: 14, fontWeight: 900, cursor: "pointer" }}>
            {mine.find(a => a.id === detail.id) ? "✓ Déjà acceptée" : (detail.solid ? "🤝 Participer à la mission" : `Accepter — ${detail.pay} €`)}
          </button>
        </div></div>}

        {/* Retard / Annulation */}
        {alrt && <div style={S} onClick={() => setAlrt(null)}><div style={SH} onClick={e => e.stopPropagation()}>
          <div style={{ fontSize: 14, fontWeight: 800, color: alrt.type === "retard" ? "#fbbf24" : "#f87171", marginBottom: 5 }}>{alrt.type === "retard" ? "⏱ Signaler un retard" : "✕ Annuler la mission"}</div>
          <div style={{ fontSize: 11, color: T.sub, marginBottom: 13, lineHeight: 1.5 }}>{alrt.type === "retard" ? "La structure sera prévenue." : "La structure sera prévenue, à titre informatif. Aucun blocage de ton accès aux missions."}</div>
          {alrt.type === "retard"
            ? <div style={{ display: "flex", gap: 6 }}>{["5 min", "10 min", "20 min", "30 min+"].map(t => <button key={t} onClick={() => { notif(`Retard ${t} signalé.`); setAlrt(null); }} style={{ flex: 1, background: T.row, color: T.text, border: `1px solid ${T.cb}`, borderRadius: 7, padding: "9px 0", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{t}</button>)}</div>
            : <div style={{ display: "flex", gap: 7 }}><button onClick={() => setAlrt(null)} style={{ flex: 1, background: T.row, color: T.sub, border: "none", borderRadius: 8, padding: "10px 0", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Revenir</button><button onClick={() => { setMine(l => l.filter(a => a.id !== alrt.m.id)); notif("Mission annulée."); setAlrt(null); }} style={{ flex: 1, background: "#dc2626", color: "#fff", border: "none", borderRadius: 8, padding: "10px 0", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>Confirmer l'annulation</button></div>}
        </div></div>}

        {/* Signalement */}
        {signal && <div style={S} onClick={closeSignal}><div style={{ ...SH, maxHeight: "88vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
          <div style={{ fontSize: 14, fontWeight: 900, color: "#f59e0b", marginBottom: 3 }}>⚠ Signaler un problème</div>
          <div style={{ fontSize: 11, color: T.sub, marginBottom: 4 }}>{signal.m.t} · {signal.m.struct}</div>
          <div style={{ fontSize: 10, color: T.mu, marginBottom: 13, lineHeight: 1.55 }}>UROSI transmet ton signalement et joue l'intermédiaire. Aucun impact sur ton accès aux missions — signaler ne te pénalise jamais.</div>
          <div style={{ fontSize: 9, fontWeight: 700, color: T.mu, textTransform: "uppercase", letterSpacing: .5, marginBottom: 7 }}>Motif</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
            {Object.entries(MOTIFS).map(([k, l]) => (
              <button key={k} onClick={() => setSigMotif(k)} style={{ textAlign: "left", display: "flex", alignItems: "center", gap: 9, background: sigMotif === k ? "#1c1400" : T.row, color: sigMotif === k ? "#f59e0b" : T.text, border: `1.5px solid ${sigMotif === k ? "#f59e0b" : T.cb}`, borderRadius: 8, padding: "11px 13px", fontSize: 12, fontWeight: sigMotif === k ? 800 : 600, cursor: "pointer" }}>

          <div style={{ fontSize: 9, fontWeight: 700, color: T.mu, textTransform: "uppercase", letterSpacing: .5, marginBottom: 7 }}>En deux mots, que s'est-il passé ?</div>

          <button onClick={closeSignal} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", fontSize: 11, color: T.mu, padding: "10px 0 0" }}>Annuler</button>
        </div></div>}

        {/* Recap + étoiles */}
        {recap && <div style={{ ...S, background: "rgba(0,0,0,.92)" }}><div style={SH} onClick={e => e.stopPropagation()}>

        {docKey && <DocModal dk={docKey} onClose={() => setDocKey(null)} />}

            <button onClick={() => setWAmt(String(wallet.dispo))} style={{ flex: 1, background: T.row, color: "#4ade80", border: `1px solid ${T.cb}`, borderRadius: 8, padding: "8px 0", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Max</button>

          </button>
          <div style={{ fontSize: 9, color: T.mu, textAlign: "center", marginTop: 9 }}>Réception sur ton compte à J+1 · fonds cantonnés Lemonway (ACPR)</div>
        </div></div>}

        {/* Feuille Aide & règles (accès discret) */}
        {aide && <div style={S} onClick={() => setAide(false)}><div style={SH} onClick={e => e.stopPropagation()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 14, fontWeight: 900, color: T.text }}>Aide & règles</span>
            <button onClick={() => setAide(false)} style={{ background: T.row, border: "none", borderRadius: 6, width: 26, height: 26, cursor: "pointer", color: T.sub, fontSize: 14 }}>×</button>
          </div>
          <AideBlock onOpen={k => { setAide(false); setDocKey(k); }} />
        </div></div>}

        {/* Confirmation suppression de compte */}
        {confirmDel && <div style={{ ...S, background: "rgba(0,0,0,.9)" }} onClick={() => setConfirmDel(false)}><div style={SH} onClick={e => e.stopPropagation()}>
          <div style={{ fontSize: 15, fontWeight: 900, color: "#f87171", marginBottom: 6 }}>Supprimer ton compte ?</div>
          <div style={{ fontSize: 11.5, color: T.sub, lineHeight: 1.6, marginBottom: 16 }}>Ton compte et tes données seront anonymisés sous 30 jours (RGPD). Ton CV vivant et ton historique seront effacés. Cette action est définitive.</div>
          <button onClick={() => { setConfirmDel(false); (onDelete || onBack)(); }} style={{ width: "100%", background: "#dc2626", color: "#fff", border: "none", borderRadius: 10, padding: "13px 0", fontSize: 13, fontWeight: 900, cursor: "pointer", marginBottom: 8 }}>Supprimer définitivement</button>
          <button onClick={() => setConfirmDel(false)} style={{ width: "100%", background: T.row, color: T.sub, border: "none", borderRadius: 10, padding: "11px 0", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Annuler</button>
        </div></div>}

        {/* KYC — vérification à la 1re acceptation, puis n'apparaît plus */}
        {kycFor && <div style={{ ...S, background: "rgba(0,0,0,.9)" }} onClick={() => setKycFor(null)}><div style={{ ...SH, maxHeight: "88vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
          <div style={{ fontSize: 15, fontWeight: 900, color: T.text, marginBottom: 4 }}>Vérifions ton identité</div>
          <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.55, marginBottom: 16 }}>Une seule fois, avant ta première mission. C'est ce qui permet d'être payé sur ton compte. Ensuite, on ne te le redemandera plus.</div>

          <div style={{ fontSize: 9, fontWeight: 700, color: T.mu, textTransform: "uppercase", letterSpacing: .5, marginBottom: 7 }}>Pièce d'identité</div>
          <button onClick={() => setKyc(k => ({ ...k, idOk: true }))} style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: kyc.idOk ? "#052e16" : T.row, color: kyc.idOk ? "#4ade80" : T.text, border: `1.5px solid ${kyc.idOk ? "#166534" : T.cb}`, borderRadius: 10, padding: "13px 0", fontSize: 12, fontWeight: 800, cursor: "pointer", marginBottom: 14 }}>
            {kyc.idOk ? "✓ Pièce d'identité ajoutée" : "＋ Photographier ma carte d'identité"}
          </button>

          <div style={{ fontSize: 9, fontWeight: 700, color: T.mu, textTransform: "uppercase", letterSpacing: .5, marginBottom: 7 }}>IBAN (pour être payé)</div>
          <input value={kyc.iban} onChange={e => setKyc(k => ({ ...k, iban: e.target.value.toUpperCase() }))} placeholder="FR76 ...." style={{ width: "100%", background: T.row, border: `1px solid ${T.cb}`, borderRadius: 9, padding: "12px 13px", fontSize: 13, color: T.text, outline: "none", boxSizing: "border-box", marginBottom: 14, letterSpacing: 1 }} />

          <div style={{ background: T.row, borderRadius: 9, padding: "10px 12px", fontSize: 9.5, color: T.mu, lineHeight: 1.55, marginBottom: 14 }}>🔒 Vérification opérée par Lemonway (agréé ACPR). Tes documents servent uniquement à confirmer ton identité et à te payer. UROSI ne stocke pas ta pièce d'identité et ne détient jamais ton argent.</div>

          <button onClick={kycConfirm} disabled={!(kyc.idOk && kyc.iban.replace(/\s/g, "").length >= 14)} style={{ width: "100%", background: (kyc.idOk && kyc.iban.replace(/\s/g, "").length >= 14) ? "#16a34a" : T.row, color: (kyc.idOk && kyc.iban.replace(/\s/g, "").length >= 14) ? "#fff" : T.mu, border: "none", borderRadius: 10, padding: "13px 0", fontSize: 14, fontWeight: 900, cursor: "pointer" }}>
            {kyc.idOk && kyc.iban.replace(/\s/g, "").length >= 14 ? "Valider et accepter la mission" : "Ajoute ta pièce et ton IBAN"}
          </button>
          <button onClick={() => setKycFor(null)} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", fontSize: 11, color: T.mu, padding: "10px 0 0" }}>Plus tard</button>
        </div></div>}

      </div>
    </div>
  );
}

// Fenêtre de publication : 48h à l'avance pour tous (flux constant).
// Au-delà = réservé aux structures de confiance UROSI (accordé par UROSI, jamais en self-service).
const CONFIANCE = false;             // ← passe à true quand UROSI accorde la confiance à cette structure
const MAX_JOUR = CONFIANCE ? 7 : 2;  // décalage max en jours
const dayLabel = o => {
  if (o === 0) return "Aujourd'hui";
  if (o === 1) return "Demain";
  if (o === 2) return "Après-demain";
  const d = new Date(); d.setDate(d.getDate() + o);
  return d.toLocaleDateString("fr", { weekday: "short", day: "2-digit", month: "2-digit" });
};

function StructureApp({ onBack, subscribed = false, demoSeconds = DEMO_SECONDS, onNeedSubscribe, subscriptionInfo = null }) {
  const [verified, setVerified] = useState(false);
  const [skipped, setSkipped] = useState(false);
  const [docKey, setDocKey] = useState(null);
  const [vf, setVf] = useState({ nom: "", siret: "" });
  const [checking, setChecking] = useState(false);
  const [stype, setStype] = useState(null);   // type détecté via SIRET : PME / entreprise / association

  // Dashboard (après l'entrée)
  const [stab, setStab] = useState("missions");
  const [candMis, setCandMis] = useState(null);   // filtre : candidats d'une mission précise
  const [showPub, setShowPub] = useState(false);
  const [aide, setAide] = useState(false);
  const [panelC, setPanelC] = useState(null);
  const [f, setF] = useState({ t: "", adr: "", pay: 42, jour: "Aujourd'hui", horaire: "", desc: "", solid: false });
  const [mis, setMis] = useState(SEED.pme.mis);
  const [cands, setCands] = useState(SEED.pme.cands);
  const [habitues, setHab] = useState(SEED.pme.habitues);

  useEffect(() => {
    if (!subscribed) return;
    setVerified(true);
    setSkipped(false);
    setVf({
      nom: subscriptionInfo?.structure || vf.nom || "Structure abonnée",
      siret: subscriptionInfo?.siret || vf.siret || "",
    });
    setMis([]);
    setCands([]);
    setHab([]);
  }, [subscribed, subscriptionInfo]);

  const [toast, setToast] = useState(null);
  const tr = useRef(null);
  const notif = m => { setToast(m); clearTimeout(tr.current); tr.current = setTimeout(() => setToast(null), 3000); };

  const vOk = vf.nom.trim().length >= 2 && vf.siret.replace(/\s/g, "").length >= 9;
  const verifier = () => { if (!vOk || checking) return; setChecking(true); setTimeout(() => { setChecking(false); setVerified(true); if (!stype) setStype({ label: "Entreprise · détecté via SIRET", ess: false }); notif("✓ Structure vérifiée — registre INSEE."); }, 1400); };
  const demo = kind => {
    if (kind === "pme") { setVf({ nom: "Burger Nord", siret: "852 123 456 00018" }); setStype({ label: "PME · Restauration rapide", ess: false }); }
    else { setVf({ nom: "Banque Alimentaire du Nord", siret: "421 987 654 00021" }); setStype({ label: "Association loi 1901 · ESS", ess: true }); }
    setMis(SEED[kind].mis); setCands(SEED[kind].cands); setHab(SEED[kind].habitues); setStab("missions");
    setChecking(true); setTimeout(() => { setChecking(false); setVerified(true); notif("✓ Vérifiée — type détecté automatiquement via le SIRET."); }, 900);
  };

  const ok = f.t.trim().length >= 2 && f.adr.trim().length >= 2 && (f.solid || f.pay > 0);
  const publish = () => {
    if (!ok) return;
    if (!subscribed && onNeedSubscribe) { onNeedSubscribe("publish"); return; }
    setMis(l => [{ id: "m" + Date.now(), t: f.t, adr: f.adr, pay: f.solid ? 0 : f.pay, solid: f.solid, dt: [f.jour, f.horaire].filter(Boolean).join(" · ") || "À planifier", desc: f.desc, st: "active" }, ...l]);
    notif(`« ${f.t} » publiée.`);
    setF({ t: "", adr: "", pay: 42, jour: "Aujourd'hui", horaire: "", desc: "", solid: false });
    setShowPub(false);
    setStab("missions");
  };
  const decide = (id, dec) => { setCands(x => x.map(c => c.id === id ? { ...c, dec } : c)); setPanelC(p => p?.id === id ? { ...p, dec } : p); notif(dec === "accepté" ? "Candidat accepté." : "Candidat refusé."); };
  const misTitle = mid => (mis.find(m => m.id === mid) || {}).t || "—";
  const pending = cands.filter(c => !c.dec);
  const candCount = mid => cands.filter(c => c.mid === mid && !c.dec).length;

  const inp = { width: "100%", background: T.row, border: `1px solid ${T.cb}`, borderRadius: 9, padding: "11px 13px", fontSize: 13, color: T.text, outline: "none", boxSizing: "border-box" };

  const TABS = [["missions", "Missions", mis.length], ["candidats", "Candidats", pending.length], ["habitues", "Habitués", habitues.length]];

  return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", justifyContent: "center", fontFamily: FONT, padding: "24px 16px" }}>
      <div style={{ width: "100%", maxWidth: 420 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 30, height: 30, borderRadius: 8, background: T.grad, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, color: "#fff", fontSize: 15 }}>U</div>
            <span style={{ fontWeight: 900, fontSize: 15, color: T.text }}>{(verified || skipped) ? "Espace structure" : "Vérifier ma structure"}</span>
            {!subscribed && (verified || skipped) && <span style={{ fontSize: 10, fontWeight: 800, color: "#fbbf24", background: "#1c1400", border: "1px solid #78350f", borderRadius: 20, padding: "3px 8px" }}>Démo {demoSeconds}s</span>}
            {subscribed && <span style={{ fontSize: 9, fontWeight: 800, color: "#4ade80", background: "#052e16", border: "1px solid #14532d", borderRadius: 20, padding: "3px 8px" }}>ABONNÉ</span>}
          </div>
          <div style={{ display: "flex", gap: 7 }}>
            <button onClick={() => setAide(true)} style={{ fontSize: 10, color: T.mu, background: "none", border: `1px solid ${T.cb}`, borderRadius: 6, padding: "4px 9px", cursor: "pointer" }}>? Aide</button>
            <button onClick={onBack} style={{ fontSize: 10, color: T.mu, background: "none", border: `1px solid ${T.cb}`, borderRadius: 6, padding: "4px 9px", cursor: "pointer" }}>← Accueil</button>
          </div>
        </div>

        {(!verified && !skipped) ? <>
          {/* Étape de vérification obligatoire */}
          <div style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 14, padding: 17, marginBottom: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: T.text, marginBottom: 4 }}>Avant de publier, on vérifie ta structure</div>
            <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.5, marginBottom: 16 }}>Seules les structures vérifiées peuvent publier des missions. Ton SIRET est contrôlé sur le registre INSEE. Tu seras classé par étoiles plus tard, une fois tes premières missions réalisées.</div>
            <Fld label="Nom de la structure"><input value={vf.nom} onChange={e => setVf(x => ({ ...x, nom: e.target.value }))} placeholder="Burger Nord" style={inp} /></Fld>
            <Fld label="SIRET"><input value={vf.siret} onChange={e => setVf(x => ({ ...x, siret: e.target.value }))} placeholder="123 456 789 00012" style={inp} /></Fld>
            <button onClick={verifier} disabled={!vOk || checking} style={{ width: "100%", background: vOk && !checking ? "#fff" : T.row, color: vOk && !checking ? "#000" : T.mu, border: "none", borderRadius: 10, padding: "13px 0", fontSize: 14, fontWeight: 900, cursor: vOk && !checking ? "pointer" : "not-allowed", marginTop: 4 }}>
              {checking ? "⟳ Vérification au registre INSEE…" : vOk ? "Vérifier ma structure" : "Renseigne nom et SIRET"}
            </button>
            <button onClick={() => setSkipped(true)} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", fontSize: 11, color: T.mu, textDecoration: "underline", padding: "10px 0 0" }}>Passer pour l'instant →</button>
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${T.cb}` }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: T.mu, textTransform: "uppercase", letterSpacing: .5, marginBottom: 8 }}>Démo — voir la différence de type</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                <button onClick={() => demo("pme")} style={{ background: T.row, color: T.text, border: `1px solid ${T.cb}`, borderRadius: 9, padding: "10px 8px", fontSize: 11, fontWeight: 700, cursor: "pointer", textAlign: "left", lineHeight: 1.4 }}>🏢 Burger Nord<br /><span style={{ fontSize: 9, color: "#22d3ee" }}>PME · Restauration</span></button>
                <button onClick={() => demo("asso")} style={{ background: T.row, color: T.text, border: `1px solid ${T.cb}`, borderRadius: 9, padding: "10px 8px", fontSize: 11, fontWeight: 700, cursor: "pointer", textAlign: "left", lineHeight: 1.4 }}>🤝 Banque Alimentaire<br /><span style={{ fontSize: 9, color: "#4ade80" }}>Association · ESS</span></button>
              </div>
            </div>
          </div>
          <div style={{ fontSize: 9, color: T.mu, textAlign: "center", lineHeight: 1.5 }}>UROSI est une plateforme de mise en relation (modèle mandataire).<br />Aucun lien de subordination n'est créé.</div>
        </> : <>
          {/* Bandeau structure */}
          {subscribed && <div style={{ background: "#052e16", border: "1px solid #14532d", borderRadius: 12, padding: "12px 15px", marginBottom: 12, fontSize: 11, color: "#4ade80", lineHeight: 1.5 }}>
            Abonnement actif : les comptes et missions de démonstration ont disparu. Ton espace est vierge, prêt pour tes vraies missions.
          </div>}

          {verified
            ? <div style={{ background: T.card, border: "1px solid #166534", borderRadius: 12, padding: "12px 15px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10 }}>
              <Av l={(vf.nom || "S").charAt(0)} h={200} sz={34} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{vf.nom || "Ma structure"}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 3, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 8, fontWeight: 700, color: "#4ade80", background: "#052e16", borderRadius: 8, padding: "1px 6px" }}>✓ Vérifiée</span>
                  {stype && <span style={{ fontSize: 8, fontWeight: 700, color: stype.ess ? "#4ade80" : "#22d3ee", background: stype.ess ? "#052e16" : "#22d3ee15", border: `1px solid ${stype.ess ? "#14532d" : "#0e7490"}`, borderRadius: 8, padding: "1px 6px" }}>{stype.ess ? "🤝 " : "🏢 "}{stype.label}</span>}
                </div>
              </div>
            </div>
            : <div style={{ background: "#1c1400", border: "1px solid #78350f", borderRadius: 12, padding: "12px 15px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 20, flexShrink: 0 }}>⚠</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: "#fbbf24" }}>Structure non vérifiée</div>
                <div style={{ fontSize: 10, color: T.sub, marginTop: 1 }}>Publication bloquée tant que ton SIRET n'est pas contrôlé.</div>
              </div>
              <button onClick={() => setSkipped(false)} style={{ background: "#fbbf24", color: "#000", border: "none", borderRadius: 7, padding: "6px 10px", fontSize: 10, fontWeight: 800, cursor: "pointer", flexShrink: 0 }}>Vérifier</button>
            </div>}

          {/* Onglets */}
          <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
            {TABS.map(([k, l, n]) => (
              <button key={k} onClick={() => { setStab(k); if (k === "candidats") setCandMis(null); }} style={{ flex: 1, position: "relative", background: stab === k ? "#fff" : T.card, color: stab === k ? "#000" : T.sub, border: `1px solid ${stab === k ? "#fff" : T.cb}`, borderRadius: 9, padding: "8px 0", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
                {l}{n > 0 && <span style={{ marginLeft: 5, fontSize: 10, fontWeight: 800, color: stab === k ? "#000" : "#22d3ee" }}>{n}</span>}
              </button>
            ))}
          </div>

          {/* ── MISSIONS ── */}
          {stab === "missions" && <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <button onClick={() => (verified || skipped || subscribed) && setShowPub(true)} style={{ width: "100%", background: T.grad, color: "#fff", border: "none", borderRadius: 11, padding: "12px 0", fontSize: 13, fontWeight: 900, cursor: "pointer", marginBottom: 2 }}>＋ Publier une mission</button>
            {mis.map((m, i) => { const [sl, sc, sb] = STAG[m.st]; const cc = candCount(m.id); return (
              <div key={m.id}>
                {i === 0 && <div style={{ fontSize: 9, fontWeight: 800, color: "#22d3ee", textTransform: "uppercase", letterSpacing: .5, marginBottom: 6, marginTop: 4 }}>★ Dernière mission publiée</div>}
                <div style={{ background: T.card, border: `1px solid ${i === 0 ? "#0e7490" : T.cb}`, boxShadow: i === 0 ? "0 0 0 1px rgba(34,211,238,.15)" : "none", borderRadius: 12, padding: "13px 15px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 7 }}>
                    <div style={{ minWidth: 0, flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 800, color: T.text, marginBottom: 2 }}>{m.t}</div>
                      <div style={{ fontSize: 10, color: T.mu }}>📍 {m.adr} · {m.dt}</div>
                      {m.desc && <div style={{ fontSize: 10, color: T.sub, marginTop: 4, lineHeight: 1.45 }}>{m.desc}</div>}
                    </div>
                    <span style={{ fontSize: 16, fontWeight: 900, color: m.solid ? "#4ade80" : T.text, flexShrink: 0, marginLeft: 10 }}>{m.solid ? "Solidaire" : m.pay + " €"}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 9, fontWeight: 700, color: sc, background: sb, borderRadius: 8, padding: "2px 8px" }}>{sl}</span>
                    {cc > 0
                      ? <button onClick={() => { setCandMis(m.id); setStab("candidats"); }} style={{ fontSize: 10, fontWeight: 700, color: "#22d3ee", background: "#22d3ee15", border: "none", borderRadius: 8, padding: "3px 9px", cursor: "pointer" }}>{cc} candidat{cc > 1 ? "s" : ""} →</button>
                      : <span style={{ fontSize: 10, color: T.mu }}>{m.st === "draft" ? "Brouillon" : "Aucun candidat pour l'instant"}</span>}
                  </div>
                </div>
              </div>
            ); })}
          </div>}

          {/* ── CANDIDATS ── */}
          {stab === "candidats" && (() => { const shown = candMis ? cands.filter(c => c.mid === candMis) : cands; return <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {candMis
              ? <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#22d3ee12", border: "1px solid #0e7490", borderRadius: 10, padding: "9px 12px" }}>
                <span style={{ fontSize: 11, color: "#22d3ee", fontWeight: 800 }}>Candidats pour « {misTitle(candMis)} »</span>
                <button onClick={() => setCandMis(null)} style={{ fontSize: 10, color: T.sub, background: T.row, border: `1px solid ${T.cb}`, borderRadius: 7, padding: "3px 9px", fontWeight: 700, cursor: "pointer" }}>Tous ✕</button>
              </div>
              : <div style={{ fontSize: 10, color: T.sub, lineHeight: 1.5, marginBottom: 2 }}>Les workers qui ont accepté tes missions. Tape un candidat pour voir son CV vivant, puis confirme ou refuse.</div>}
            {shown.map(c => (
              <div key={c.id} style={{ background: T.card, border: `1px solid ${c.dec === "accepté" ? "#166534" : c.dec === "refusé" ? "#7f1d1d" : T.cb}`, borderRadius: 12, overflow: "hidden" }}>
                <div style={{ padding: "12px 14px", display: "flex", gap: 11, alignItems: "center", cursor: "pointer" }} onClick={() => setPanelC(c)}>
                  <Av l={c.av} h={c.hue} sz={38} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                      <span style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{c.nom}</span>
                      {c.fois > 0 && <span style={{ fontSize: 8, fontWeight: 700, color: "#fbbf24", background: "#1c1400", borderRadius: 8, padding: "1px 6px" }}>★ Habitué · {c.fois}×</span>}
                    </div>
                    <div style={{ fontSize: 10, color: T.mu, marginBottom: 3, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{misTitle(c.mid)} · {c.ville} · {c.dist} km</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}><Stars n={c.note} size={10} /><span style={{ fontSize: 10, color: T.mu }}>{c.note} · {c.nb} missions</span></div>
                  </div>
                  {c.dec && <span style={{ fontSize: 10, fontWeight: 800, color: c.dec === "accepté" ? "#4ade80" : "#f87171", flexShrink: 0 }}>{c.dec}</span>}
                </div>
                {!c.dec && <div style={{ padding: "0 14px 12px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                  <button onClick={() => decide(c.id, "accepté")} style={{ background: "#052e16", color: "#4ade80", border: "1px solid #166534", borderRadius: 8, padding: "9px 0", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>✓ Accepter</button>
                  <button onClick={() => decide(c.id, "refusé")} style={{ background: "#1f0000", color: "#f87171", border: "1px solid #7f1d1d", borderRadius: 8, padding: "9px 0", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Refuser</button>
                </div>}
              </div>
            ))}
            {shown.length === 0 && <div style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 12, padding: "20px", textAlign: "center", fontSize: 11, color: T.mu }}>{candMis ? "Personne n'a encore accepté cette mission." : "Aucun candidat pour l'instant."}</div>}
          </div>; })()}

          {/* ── HABITUÉS ── */}
          {stab === "habitues" && <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ fontSize: 10, color: T.sub, lineHeight: 1.5, marginBottom: 2 }}>Les workers qui reviennent régulièrement chez toi. Tu peux les recontacter en priorité pour tes prochaines missions.</div>
            {habitues.map((h, i) => (
              <div key={i} style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 12, padding: "12px 14px", display: "flex", gap: 11, alignItems: "center" }}>
                <Av l={h.av} h={h.hue} sz={38} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{h.nom}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2 }}><Stars n={h.note} size={10} /><span style={{ fontSize: 10, color: T.mu }}>{h.note} · dernière : {h.last}</span></div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontSize: 17, fontWeight: 900, color: "#fbbf24" }}>{h.fois}×</div>
                  <div style={{ fontSize: 8, color: T.mu }}>missions ici</div>
                </div>
              </div>
            ))}
            {habitues.length === 0 && <div style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 12, padding: "20px", textAlign: "center", fontSize: 11, color: T.mu }}>Pas encore d'habitués.</div>}
          </div>}
        </>}

        {/* Feuille Aide & règles (accès discret depuis l'en-tête) */}
        {aide && <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 400 }} onClick={() => setAide(false)}>
          <div style={{ width: "100%", maxWidth: 420, background: T.card, borderRadius: "20px 20px 0 0", padding: "16px 16px 26px", fontFamily: FONT }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontSize: 14, fontWeight: 900, color: T.text }}>Aide & règles</span>
              <button onClick={() => setAide(false)} style={{ background: T.row, border: "none", borderRadius: 6, width: 26, height: 26, cursor: "pointer", color: T.sub, fontSize: 14 }}>×</button>
            </div>
            <AideBlock onOpen={k => { setAide(false); setDocKey(k); }} />
          </div>
        </div>}

        {/* Panneau candidat — historique factuel */}
        {panelC && <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 400 }} onClick={() => setPanelC(null)}>
          <div style={{ width: "100%", maxWidth: 420, background: T.card, borderRadius: "20px 20px 0 0", padding: "18px 16px 26px", fontFamily: FONT }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", gap: 11, alignItems: "center", marginBottom: 13 }}>
              <Av l={panelC.av} h={panelC.hue} sz={44} />
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 15, fontWeight: 900, color: T.text }}>{panelC.nom}</span>
                  {panelC.fois > 0 && <span style={{ fontSize: 8, fontWeight: 700, color: "#fbbf24", background: "#1c1400", borderRadius: 8, padding: "1px 6px" }}>★ Habitué · {panelC.fois}×</span>}
                </div>
                <div style={{ fontSize: 10, color: T.mu, marginTop: 2 }}>{panelC.ville} · {panelC.dist} km · candidat sur « {misTitle(panelC.mid)} »</div>
              </div>
              <button onClick={() => setPanelC(null)} style={{ background: T.row, border: "none", borderRadius: 6, width: 24, height: 24, cursor: "pointer", color: T.sub, fontSize: 13 }}>×</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 13 }}>
              {[["Missions", panelC.nb], ["Note", `${panelC.note}/5`], ["Chez toi", `${panelC.fois}×`]].map(([l, v]) => <div key={l} style={{ background: T.row, borderRadius: 8, padding: "9px 6px", textAlign: "center" }}><div style={{ fontSize: 15, fontWeight: 900, color: T.text }}>{v}</div><div style={{ fontSize: 8, color: T.mu, marginTop: 1 }}>{l}</div></div>)}
            </div>
            <div style={{ fontSize: 9, fontWeight: 700, color: T.mu, textTransform: "uppercase", letterSpacing: .5, marginBottom: 7 }}>Historique vérifié (CV vivant)</div>
            {panelC.hist.map(([t, d], i) => <div key={i} style={{ display: "flex", justifyContent: "space-between", background: T.row, borderRadius: 7, padding: "8px 11px", marginBottom: 4 }}><span style={{ fontSize: 11, color: T.text, fontWeight: 600 }}>{t}</span><span style={{ fontSize: 10, color: T.mu }}>{d}</span></div>)}
            {!panelC.dec
              ? <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginTop: 10 }}>
                <button onClick={() => decide(panelC.id, "accepté")} style={{ background: "#052e16", color: "#4ade80", border: "1px solid #166534", borderRadius: 8, padding: "11px 0", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>✓ Accepter</button>
                <button onClick={() => decide(panelC.id, "refusé")} style={{ background: "#1f0000", color: "#f87171", border: "1px solid #7f1d1d", borderRadius: 8, padding: "11px 0", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Refuser</button>
              </div>
              : <div style={{ textAlign: "center", marginTop: 10, fontSize: 12, fontWeight: 800, color: panelC.dec === "accepté" ? "#4ade80" : "#f87171" }}>Décision : {panelC.dec}</div>}
          </div>
        </div>}

        {/* Publier (modal) */}
        {showPub && <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 400 }} onClick={() => setShowPub(false)}>
          <div style={{ width: "100%", maxWidth: 420, background: T.card, borderRadius: "20px 20px 0 0", padding: "18px 16px 26px", fontFamily: FONT }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <span style={{ fontSize: 15, fontWeight: 900, color: T.text }}>Nouvelle mission</span>
              <button onClick={() => setShowPub(false)} style={{ background: T.row, border: "none", borderRadius: 6, width: 26, height: 26, cursor: "pointer", color: T.sub, fontSize: 14 }}>×</button>
            </div>
            <Fld label="Intitulé de la mission"><input value={f.t} onChange={e => setF(x => ({ ...x, t: e.target.value }))} placeholder="Renfort service midi" style={inp} autoFocus /></Fld>
            <Fld label="Adresse"><input value={f.adr} onChange={e => setF(x => ({ ...x, adr: e.target.value }))} placeholder="12 Rue de Béthune, Lille" style={inp} /></Fld>
            <Fld label="Jour">
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                {Array.from({ length: MAX_JOUR + 1 }).map((_, o) => { const l = dayLabel(o); return (
                  <button key={o} onClick={() => setF(x => ({ ...x, jour: l }))} style={{ background: f.jour === l ? "#fff" : T.row, color: f.jour === l ? "#000" : T.sub, border: `1px solid ${f.jour === l ? "#fff" : T.cb}`, borderRadius: 20, padding: "5px 11px", fontSize: 11, fontWeight: 700, cursor: "pointer", textTransform: "capitalize" }}>{l}</button>
                ); })}
                {!CONFIANCE && <button onClick={() => notif("Publication limitée à 48h à l'avance — flux constant. Planifier plus loin est réservé aux structures de confiance UROSI.")} style={{ background: T.row, color: T.mu, border: `1px dashed ${T.cb}`, borderRadius: 20, padding: "5px 11px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>🔒 + tard</button>}
              </div>
              <div style={{ fontSize: 9, color: T.mu, marginTop: 7, lineHeight: 1.5 }}>{CONFIANCE ? "✓ Structure de confiance UROSI — tu peux planifier jusqu'à 7 jours." : "Publication ouverte à 48h à l'avance (flux constant). Au-delà : réservé aux structures de confiance UROSI, dont on anticipe déjà les besoins."}</div>
            </Fld>
            <Fld label="Horaire">
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 8 }}>
                {["11h – 15h", "18h – 23h", "9h – 17h", "Soir", "Journée"].map(h => (
                  <button key={h} onClick={() => setF(x => ({ ...x, horaire: h }))} style={{ background: f.horaire === h ? "#fff" : T.row, color: f.horaire === h ? "#000" : T.sub, border: `1px solid ${f.horaire === h ? "#fff" : T.cb}`, borderRadius: 20, padding: "5px 11px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{h}</button>
                ))}
              </div>
              <input value={f.horaire} onChange={e => setF(x => ({ ...x, horaire: e.target.value }))} placeholder="ou saisir : Aujourd'hui · 12h – 15h" style={inp} />
            </Fld>
            <Fld label="Descriptif de la mission">
              <textarea value={f.desc} onChange={e => setF(x => ({ ...x, desc: e.target.value }))} rows={3} placeholder="Ce que le worker fera concrètement : rush du midi, aide au comptoir, port de charges…"
                style={{ ...inp, resize: "none", lineHeight: 1.5 }} />
            </Fld>
            {stype?.ess && <Fld label="Type de mission">
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                <button onClick={() => setF(x => ({ ...x, solid: false }))} style={{ background: !f.solid ? "#fff" : T.row, color: !f.solid ? "#000" : T.sub, border: `1px solid ${!f.solid ? "#fff" : T.cb}`, borderRadius: 9, padding: "10px 0", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>€ Rémunérée</button>
                <button onClick={() => setF(x => ({ ...x, solid: true }))} style={{ background: f.solid ? "#16a34a" : T.row, color: f.solid ? "#fff" : "#4ade80", border: `1px solid ${f.solid ? "#16a34a" : "#14532d"}`, borderRadius: 9, padding: "10px 0", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>🤝 Solidaire (0€)</button>
              </div>
            </Fld>}
            {f.solid
              ? <div style={{ background: "#052e16", border: "1px solid #14532d", borderRadius: 9, padding: "11px 13px", marginBottom: 12, fontSize: 10.5, color: "#4ade80", lineHeight: 1.55 }}>🤝 Mission bénévole à 0 €. Elle comptera dans le CV vivant des participants comme preuve d'engagement. Réservée aux structures de l'ESS (associations).</div>
              : <Fld label="Rémunération (€)">
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <button onClick={() => setF(x => ({ ...x, pay: Math.max(10, x.pay - 5) }))} style={{ width: 34, height: 34, borderRadius: "50%", background: T.row, border: `1px solid ${T.cb}`, color: T.text, fontSize: 18, cursor: "pointer" }}>−</button>
                  <span style={{ fontSize: 24, fontWeight: 900, color: T.text, minWidth: 70, textAlign: "center" }}>{f.pay} €</span>
                  <button onClick={() => setF(x => ({ ...x, pay: x.pay + 5 }))} style={{ width: 34, height: 34, borderRadius: "50%", background: T.grad, border: "none", color: "#fff", fontSize: 18, cursor: "pointer" }}>+</button>
                </div>
              </Fld>}
            {!verified && <div style={{ background: "#1c1400", border: "1px solid #78350f", borderRadius: 9, padding: "9px 12px", marginBottom: 12, fontSize: 10, color: "#fbbf24", lineHeight: 1.5 }}>⚠ Vérifie ta structure pour que la mission soit publiée avec le badge « Vérifié ».</div>}
            <button onClick={publish} disabled={!ok} style={{ width: "100%", background: ok ? "#fff" : T.row, color: ok ? "#000" : T.mu, border: "none", borderRadius: 10, padding: "13px 0", fontSize: 14, fontWeight: 900, cursor: ok ? "pointer" : "not-allowed" }}>
              {ok ? (f.solid ? "Publier — Solidaire (0 €)" : `Publier — ${f.pay} €`) : "Remplis l'intitulé et l'adresse"}
            </button>
          </div>
        </div>}

        {docKey && <DocModal dk={docKey} onClose={() => setDocKey(null)} />}
        {toast && <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "#fff", color: "#000", borderRadius: 9, padding: "9px 16px", fontSize: 12, fontWeight: 700, boxShadow: "0 6px 20px rgba(0,0,0,.3)", whiteSpace: "nowrap" }}>{toast}</div>}
      </div>
    </div>
  );
}

// ═══ INSCRIPTION WORKER ══════════════════════════════════════════════════════
function WorkerSignup({ onDone, onBack }) {
  const [f, setF] = useState({ prenom: "", nom: "", email: "", tel: "", naissance: "", adresse: "", ville: "" });
  const ok = f.prenom.trim().length >= 2 && f.nom.trim().length >= 1 && /\S+@\S+\.\S+/.test(f.email) && f.tel.replace(/\s/g, "").length >= 8;
  const inp = { width: "100%", background: T.row, border: `1px solid ${T.cb}`, borderRadius: 9, padding: "12px 13px", fontSize: 13, color: T.text, outline: "none", boxSizing: "border-box" };

  return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", justifyContent: "center", fontFamily: FONT, padding: "24px 16px" }}>
      <div style={{ width: "100%", maxWidth: 400 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <span style={{ fontWeight: 900, fontSize: 15, color: T.text }}>Créer mon compte</span>
          <button onClick={onBack} style={{ fontSize: 10, color: T.mu, background: "none", border: `1px solid ${T.cb}`, borderRadius: 6, padding: "4px 9px", cursor: "pointer" }}>← Accueil</button>
        </div>
        <div style={{ textAlign: "center", marginBottom: 20 }}><Logo sz={54} /></div>
        <div style={{ background: T.card, border: `1px solid ${T.cb}`, borderRadius: 14, padding: 17 }}>
          <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.5, marginBottom: 16 }}>Juste l'essentiel pour commencer. Pas de pièce d'identité ni d'IBAN maintenant — on te les demandera seulement quand tu accepteras ta première mission.</div>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}><Fld label="Prénom"><input value={f.prenom} onChange={e => setF(x => ({ ...x, prenom: e.target.value }))} placeholder="Alex" style={inp} autoFocus /></Fld></div>
            <div style={{ flex: 1 }}><Fld label="Nom"><input value={f.nom} onChange={e => setF(x => ({ ...x, nom: e.target.value }))} placeholder="Martin" style={inp} /></Fld></div>
          </div>
          <Fld label="Date de naissance"><input value={f.naissance} onChange={e => setF(x => ({ ...x, naissance: e.target.value }))} type="date" style={inp} /></Fld>
          <Fld label="Lieu où tu habites"><input value={f.adresse} onChange={e => setF(x => ({ ...x, adresse: e.target.value }))} placeholder="Adresse ou quartier" style={inp} /></Fld>
          <Fld label="Email"><input value={f.email} onChange={e => setF(x => ({ ...x, email: e.target.value }))} placeholder="alex@example.fr" style={inp} inputMode="email" /></Fld>
          <Fld label="Numéro de téléphone"><input value={f.tel} onChange={e => setF(x => ({ ...x, tel: e.target.value }))} placeholder="06 12 34 56 78" style={inp} inputMode="tel" /></Fld>
          <Fld label="Ville"><input value={f.ville} onChange={e => setF(x => ({ ...x, ville: e.target.value }))} placeholder="Angers" style={inp} /></Fld>
          <button onClick={() => ok && onDone({ prenom: f.prenom.trim(), nom: f.nom.trim(), ville: f.ville.trim() || "Angers", adresse: f.adresse.trim(), naissance: f.naissance, email: f.email.trim(), tel: f.tel.trim() })} disabled={!ok} style={{ width: "100%", background: ok ? "#fff" : T.row, color: ok ? "#000" : T.mu, border: "none", borderRadius: 10, padding: "13px 0", fontSize: 14, fontWeight: 900, cursor: ok ? "pointer" : "not-allowed", marginTop: 4 }}>
            {ok ? "Créer mon compte" : "Remplis tes infos"}
          </button>
          <button onClick={() => onDone(DEMO_PROFILE)} style={{ width: "100%", background: "none", border: "none", cursor: "pointer", fontSize: 12, color: T.sub, textDecoration: "underline", padding: "12px 0 0", fontWeight: 700 }}>Entrer dans la démo →</button>
          <div style={{ fontSize: 9, color: T.mu, textAlign: "center", lineHeight: 1.5, marginTop: 10 }}>En créant ton compte, tu acceptes les CGU et la politique RGPD d'UROSI. Tu pourras supprimer ton compte à tout moment.</div>
        </div>
      </div>
    </div>
  );
}

// ═══ ROOT ════════════════════════════════════════════════════════════════════
function SubscribeModal({ role, reason, onClose, onDone }) {
  const [f, setF] = useState({ email: "", tel: "", siret: "", structure: "" });
  const isStruct = role === "structure";
  const ok = /\S+@\S+\.\S+/.test(f.email) && f.tel.replace(/\s/g, "").length >= 8 && (!isStruct || (f.structure.trim().length >= 2 && f.siret.replace(/\s/g, "").length >= 9));
  const inp = { width: "100%", background: T.row, border: `1px solid ${T.cb}`, borderRadius: 9, padding: "12px 13px", fontSize: 13, color: T.text, outline: "none", boxSizing: "border-box" };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.88)", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 16, fontFamily: FONT }}>
      <div style={{ width: "100%", maxWidth: 390, background: T.card, border: `1px solid ${T.cb}`, borderRadius: 18, padding: 18, boxShadow: "0 24px 90px rgba(0,0,0,.55)" }}>
        <div style={{ fontSize: 16, fontWeight: 900, color: T.text, marginBottom: 5 }}>{reason === "publish" ? "Abonnement requis pour publier" : "Démo terminée"}</div>
        <div style={{ fontSize: 11, color: T.sub, lineHeight: 1.55, marginBottom: 15 }}>
          {isStruct ? "Renseigne ton email, ton téléphone et ton SIRET. Après abonnement, les faux comptes disparaissent et ton espace structure repart vierge." : "Renseigne tes informations pour continuer. Les champs de démo disparaissent dès que l'abonnement est validé."}
        </div>
        {isStruct && <Fld label="Nom de la structure"><input value={f.structure} onChange={e => setF(x => ({ ...x, structure: e.target.value }))} placeholder="Ma structure" style={inp} /></Fld>}
        {isStruct && <Fld label="SIRET"><input value={f.siret} onChange={e => setF(x => ({ ...x, siret: e.target.value }))} placeholder="123 456 789 00012" style={inp} /></Fld>}
        <Fld label="Email"><input value={f.email} onChange={e => setF(x => ({ ...x, email: e.target.value }))} placeholder="contact@email.fr" style={inp} inputMode="email" /></Fld>
        <Fld label="Téléphone"><input value={f.tel} onChange={e => setF(x => ({ ...x, tel: e.target.value }))} placeholder="06 12 34 56 78" style={inp} inputMode="tel" /></Fld>
        <button onClick={() => ok && onDone(f)} disabled={!ok} style={{ width: "100%", background: ok ? "#16a34a" : T.row, color: ok ? "#fff" : T.mu, border: "none", borderRadius: 10, padding: "13px 0", fontSize: 14, fontWeight: 900, cursor: ok ? "pointer" : "not-allowed" }}>
          {ok ? "S'abonner et continuer" : "Complète les informations"}
        </button>
        {reason !== "locked" && <button onClick={onClose} style={{ width: "100%", background: "none", border: "none", color: T.mu, cursor: "pointer", padding: "12px 0 0", fontSize: 12, fontWeight: 700 }}>Plus tard</button>}
      </div>
    </div>
  );
}

function Root() {
  const [route, setRoute] = useState(null);
  const [workerInfos, setWorkerInfos] = useState(null);
  const [subscribed, setSubscribed] = useState(false);
  const [subscriptionInfo, setSubscriptionInfo] = useState(null);
  const [demoSeconds, setDemoSeconds] = useState(DEMO_SECONDS);
  const [locked, setLocked] = useState(false);
  const [subscribeReason, setSubscribeReason] = useState(null);

  useEffect(() => {
    if (!route || subscribed) return;
    setDemoSeconds(DEMO_SECONDS);
    setLocked(false);
    const timer = setInterval(() => {
      setDemoSeconds(s => {
        if (s <= 1) {
          clearInterval(timer);
          setLocked(true);
          setSubscribeReason("locked");
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [route, subscribed]);

  const needSubscribe = reason => setSubscribeReason(reason || "access");
  const finishSubscribe = info => {
    setSubscribed(true);
    setSubscriptionInfo(info);
    setLocked(false);
    setSubscribeReason(null);
    if (route === "worker") setWorkerInfos(w => ({ ...(w || DEMO_PROFILE), email: info.email, tel: info.tel }));
  };
  const closeSubscribe = () => { if (!locked) setSubscribeReason(null); };

  const overlay = subscribeReason
    ? <SubscribeModal role={route} reason={subscribeReason} onClose={closeSubscribe} onDone={finishSubscribe} />
    : null;

  if (route === "worker") return <>
    {workerInfos
      ? <WorkerApp infos={workerInfos} subscribed={subscribed} demoSeconds={demoSeconds} onNeedSubscribe={needSubscribe} onBack={() => setRoute(null)} onDelete={() => { setWorkerInfos(null); setRoute(null); }} />
      : <WorkerSignup onDone={i => setWorkerInfos(i)} onBack={() => setRoute(null)} />}
    {overlay}
  </>;
  if (route === "structure") return <><StructureApp subscribed={subscribed} subscriptionInfo={subscriptionInfo} demoSeconds={demoSeconds} onNeedSubscribe={needSubscribe} onBack={() => setRoute(null)} />{overlay}</>;
  return (
    <div style={{ minHeight: "100vh", background: T.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT }}>
      <div style={{ width: 300, textAlign: "center" }}>
        <div style={{ marginBottom: 28 }}><Logo sz={78} /></div>
        <div style={{ fontSize: 12, color: T.mu, marginBottom: 30 }}>Micro-missions · Métropole de Lille</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <button onClick={() => setRoute("worker")} style={{ textAlign: "left", padding: "16px 17px", borderRadius: 13, border: `1.5px solid ${T.cb}`, background: T.card, cursor: "pointer" }}>
            <div style={{ fontSize: 19, marginBottom: 5 }}>👷</div>
            <div style={{ fontSize: 14, fontWeight: 800, color: T.text, marginBottom: 2 }}>Je cherche des missions</div>
            <div style={{ fontSize: 12, color: T.mu }}>Flux, présence, et mon CV vivant</div>
          </button>
          <button onClick={() => setRoute("structure")} style={{ textAlign: "left", padding: "16px 17px", borderRadius: 13, border: "none", background: T.grad, cursor: "pointer" }}>
            <div style={{ fontSize: 19, marginBottom: 5 }}>🏢</div>
            <div style={{ fontSize: 14, fontWeight: 800, color: "#fff", marginBottom: 2 }}>Je publie des missions</div>
            <div style={{ fontSize: 12, color: "#bfdbfe" }}>Intitulé, adresse, rémunération</div>
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
